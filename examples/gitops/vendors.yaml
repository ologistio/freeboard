# Sample vendors as declared assets: the software, platforms, and external parties
# the organisation relies on. Collectors, evidence, and per-vendor exceptions map to
# these ids. Each vendor names an owner (a Company/Department asset) that makes it
# visible to that org's readers. CrowdStrike, Fleet, and Google Workspace are real
# named integrations; the remaining vendors are invented for illustration.
