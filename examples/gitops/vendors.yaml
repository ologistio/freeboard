# Sample vendors: the software, platforms, and external parties the
# organisation relies on. Collectors, evidence, and per-vendor exceptions map to
# these ids. A Vendor is a plain identity record (id + title); richer metadata is
# not modelled yet. CrowdStrike, Fleet, and Google Workspace are real named
# integrations; the remaining vendors are invented for illustration.
