# Sample scopes. Each maps one organisation to one standard with a disposition
# (In or Out). Dispositions are sparse: a node with no scope for a standard
# inherits its nearest ancestor's disposition.
apiVersion: freeboard.dev/v1alpha1
kind: Scope
id: scope-products-ce
title: Ologist Products - Cyber Essentials
organisation: ologist-products
standard: std-cyber-essentials
disposition: In
