# Local MySQL for development and integration tests. Lives in
# tests/Freeboard.TestInfrastructure with the shared test fixture and the
# mysql-init grant script.
#
# Stand it up from the repo root:
#   docker compose -f tests/Freeboard.TestInfrastructure/docker-compose.yml up -d
#
# Connection string (used as FREEBOARD_DB at runtime, FREEBOARD_TEST_DB for tests):
#   Server=127.0.0.1;Port=3306;Database=freeboard;User ID=freeboard;Password=freeboard;
#
# The connection string is a secret in real deployments. Supply it via an
# environment variable, .NET user-secrets, or a config provider - never commit it.

# Mailpit is a local SMTP sink for the gated auth-email integration test. Stand it up the
# same way as MySQL, then point FREEBOARD_TEST_SMTP at it:
#   FREEBOARD_TEST_SMTP="Smtp=127.0.0.1:1025;Http=http://127.0.0.1:8025"
# SMTP listens on 1025 (no TLS); the web UI / messages API on 8025.

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: freeboard
      MYSQL_USER: freeboard
      MYSQL_PASSWORD: freeboard
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - freeboard-mysql:/var/lib/mysql
      # Local-only grants so the freeboard user can provision the fb_test_* throwaway
      # databases the integration tests create. Dev/test convenience, not for production.
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    # /readyz is Mailpit's readiness endpoint on the HTTP UI port. The image is
    # Alpine with wget, so `compose up -d --wait` can block on it.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8025/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  freeboard-mysql:
