name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  code-quality: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      # Reuse the test-infrastructure compose so CI runs the same services (MySQL
      # and the Mailpit SMTP sink) as local dev: the same images, credentials, and
      # the fb_test_* grant init script. The grants let the integration tests
      # provision throwaway fb_test_* databases. --wait blocks until healthchecks
      # pass. Started early so they warm up during restore and build.
      - name: Start test services
        run: docker compose -f tests/Freeboard.TestInfrastructure/docker-compose.yml up -d --wait

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Install coverage tool
        run: dotnet tool install --global dotnet-coverage

      # FREEBOARD_TEST_DB and FREEBOARD_TEST_SMTP switch the integration tests on;
      # without them they skip. Both target the compose services started above.
      - name: Run tests with coverage
        env:
          FREEBOARD_TEST_DB: "Server=127.0.0.1;Port=3306;Database=freeboard;User ID=freeboard;Password=freeboard;"
          FREEBOARD_TEST_SMTP: "Smtp=127.0.0.1:1025;Http=http://127.0.0.1:8025"
        run: dotnet-coverage collect "dotnet test --configuration Release --no-build --no-restore" -f cobertura -o coverage.xml

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage.xml
          language: "C#"
          label: code-coverage/dotnet

      - name: Stop test services
        if: always()
        run: docker compose -f tests/Freeboard.TestInfrastructure/docker-compose.yml down -v

  # Runs in parallel with `test` (no `needs`). The browser E2E suite
  # (tests/Freeboard.WebE2E) drives the auth screens in real Chromium over HTTPS
  # Kestrel using the in-memory fakes, so it needs no MySQL/SMTP services - just a
  # browser. The `test` job above still builds the E2E project, but skips it
  # because FREEBOARD_TEST_E2E is unset there.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Install the Chromium build Playwright drives, plus its OS dependencies.
      # The Microsoft.Playwright package generates this script under the E2E
      # project's build output; pwsh is preinstalled on the runner.
      - name: Install Playwright browser
        run: pwsh tests/Freeboard.WebE2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      # FREEBOARD_TEST_E2E switches on the otherwise-skipped browser suite. The
      # fixture serves its own self-signed HTTPS origin, so no dev cert is needed.
      - name: Run E2E tests
        env:
          FREEBOARD_TEST_E2E: "1"
        run: dotnet test tests/Freeboard.WebE2E --configuration Release --no-build --no-restore
