name: Labeler

# Reconciles repo labels to .github/labels.yml. On main it applies changes
# (create/update/delete); on PRs it dry-runs so label edits can be reviewed
# before merge.

on:
  push:
    branches: [main]
    paths: ['.github/labels.yml']
  pull_request:
    paths: ['.github/labels.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  labeler:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout + read labels.yml (job map replaces the top-level one)
      issues: write        # create/update/delete labels
    steps:
      - uses: actions/checkout@v6

      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: false   # labels.yml is authoritative; prune the rest
          # Apply only on main (push or manual dispatch); dry-run everywhere else
          # so a branch's labels.yml can never prune live labels before merge.
          dry-run: ${{ !((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main') }}
