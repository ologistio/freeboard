- name: ee
  color: 6f42c1
  description: Enterprise Edition carve-out
- name: dogfood
  color: fbca04
  description: Ologist's own CE+ programme config
- name: web-ui
  color: e36209
  description: Web UI app (src/Freeboard)
- name: cli
  color: 6e7781
