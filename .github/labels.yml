# Source of truth for this repo's labels. The Labeler workflow
# (.github/workflows/labeler.yml) reconciles GitHub to match this file:
# labels here are created or updated, labels not here are deleted.
# Edit here, not in the GitHub UI. Colors are 6-digit hex, no leading '#'.

# --- Issue type (drives release-drafter categories and SemVer bump) ---
# One label per Conventional Commit type. Applied to bug/feature issues by the
# issue templates and to PRs by release-drafter's autolabeler.
- name: feature
  color: a2eeef
  description: Feature request, or a feat change (minor bump)
- name: fix
  color: d73a4a
  description: Bug report, or a fix change (patch bump)
- name: chore
  color: ededed
  description: Maintenance (build, ci, docs, perf, refactor, style, test)
- name: breaking
  color: b60205
  description: Breaking change (major bump)

# --- Triage ---
- name: documentation
  color: 0075ca
  description: Improvements or additions to documentation
- name: question
  color: d876e3
  description: Further information is requested
- name: duplicate
  color: cfd3d7
  description: This issue or pull request already exists
- name: invalid
  color: e4e669
  description: This doesn't seem right
- name: wontfix
  color: ffffff
  description: This will not be worked on
- name: good first issue
  color: 7057ff
  description: Good for newcomers
- name: help wanted
  color: "008672"
  description: Extra attention is needed
- name: backlog
  color: c5def5
  description: Out of the October V1 cut; roadmap

# --- Domain ---
# Durable code area a change touches. Orthogonal to epic:* (roadmap
# initiatives): an issue can carry a domain and an epic. Apply the domains that
# fit; leave others off.
- name: authn
